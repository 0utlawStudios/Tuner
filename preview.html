<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tuner — Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0A0A0F;
    --bg2: #12121A;
    --surface: #1A1A25;
    --surface-light: #252535;
    --primary: #00FFB2;
    --primary-dim: #00CC8E;
    --primary-glow: rgba(0, 255, 178, 0.25);
    --in-tune: #00FFB2;
    --close: #FFD700;
    --sharp: #FF4466;
    --text: #FFFFFF;
    --text-sec: #8888AA;
    --text-dim: #555566;
    --gauge-track: #2A2A3A;
    --gauge-tick: #444466;
  }

  body {
    background: #050508;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: var(--bg);
    border-radius: 44px;
    border: 3px solid #222;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
    box-shadow: 0 0 80px rgba(0,0,0,0.8), 0 0 2px rgba(255,255,255,0.05) inset;
  }

  .notch {
    width: 126px;
    height: 34px;
    background: #000;
    border-radius: 0 0 18px 18px;
    margin: 0 auto;
    position: relative;
    z-index: 10;
  }

  .screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 8px 0 30px;
    position: relative;
    background: linear-gradient(180deg, #0A0A0F 0%, #0D0D14 50%, #0A0A0F 100%);
  }

  /* In-tune glow */
  .glow-bg {
    position: absolute;
    top: 15%;
    left: 5%;
    right: 5%;
    height: 280px;
    border-radius: 140px;
    background: radial-gradient(ellipse, var(--primary-glow) 0%, transparent 70%);
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
    filter: blur(30px);
  }
  .glow-bg.active {
    animation: pulse-glow 1.4s ease-in-out infinite alternate;
  }
  @keyframes pulse-glow {
    0% { opacity: 0.3; }
    100% { opacity: 0.9; }
  }

  /* Status bar */
  .status-text {
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin: 12px 0 4px;
    transition: color 0.3s;
    position: relative;
    z-index: 1;
  }
  .status-text.listening { color: var(--primary-dim); }

  /* Waveform */
  .waveform-section {
    height: 90px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  .waveform-canvas { width: 360px; height: 80px; }

  /* Gauge */
  .gauge-section {
    display: flex;
    justify-content: center;
    margin-top: 4px;
    position: relative;
    z-index: 1;
  }
  .gauge-svg { width: 290px; height: 165px; }

  /* Note Display */
  .note-section {
    text-align: center;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }
  .note-row { display: inline-flex; align-items: baseline; }
  .note-name {
    font-size: 76px;
    font-weight: 700;
    letter-spacing: 2px;
    line-height: 1;
    transition: color 0.15s, text-shadow 0.3s;
  }
  .note-name.glow { text-shadow: 0 0 30px rgba(0,255,178,0.4); }
  .note-sharp { font-size: 36px; font-weight: 500; margin-left: 2px; }
  .note-octave {
    font-size: 28px;
    font-weight: 400;
    color: var(--text-sec);
    margin-left: 4px;
  }
  .cents-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 16px;
    margin-top: 10px;
  }
  .cents-display {
    font-size: 24px;
    font-weight: 600;
    letter-spacing: 1px;
    font-variant-numeric: tabular-nums;
    transition: color 0.15s;
    min-width: 80px;
    text-align: center;
  }
  .cents-bar-container {
    width: 160px;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    position: relative;
    overflow: visible;
  }
  .cents-bar-center {
    position: absolute;
    left: 50%;
    top: -2px;
    width: 2px;
    height: 10px;
    background: var(--primary);
    transform: translateX(-50%);
    border-radius: 1px;
  }
  .cents-bar-indicator {
    position: absolute;
    top: -1px;
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    transform: translateX(-50%);
    transition: left 0.15s ease-out, background 0.2s;
    box-shadow: 0 0 6px rgba(255,255,255,0.3);
  }
  .freq-display {
    font-size: 13px;
    color: var(--text-dim);
    margin-top: 6px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.5px;
  }

  /* String Indicator */
  .strings-section {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 24px;
    position: relative;
    z-index: 1;
  }
  .string-dot {
    width: 46px;
    height: 46px;
    border-radius: 23px;
    background: var(--surface);
    border: 1.5px solid var(--surface-light);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-sec);
    cursor: pointer;
    transition: all 0.25s ease;
    line-height: 1;
  }
  .string-dot:hover { border-color: #555; }
  .string-dot.active {
    background: rgba(0, 255, 178, 0.12);
    border-color: var(--primary);
    color: var(--primary);
    box-shadow: 0 0 12px rgba(0,255,178,0.15);
  }
  .string-dot .oct { font-size: 9px; font-weight: 400; opacity: 0.7; margin-top: 1px; }

  /* Instrument Selector */
  .instrument-section {
    margin-top: auto;
    padding: 16px 20px 0;
    position: relative;
    z-index: 1;
  }
  .instrument-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .instrument-chips {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    -ms-overflow-style: none;
    scrollbar-width: none;
  }
  .instrument-chips::-webkit-scrollbar { display: none; }
  .chip {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    border-radius: 999px;
    background: var(--surface);
    border: 1px solid transparent;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-sec);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    user-select: none;
  }
  .chip.selected {
    background: rgba(0, 255, 178, 0.1);
    border-color: var(--primary);
    color: var(--primary);
  }
  .chip:hover:not(.selected) { border-color: #444; }
  .chip-icon { font-size: 15px; }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="notch"></div>
  <div class="screen">
    <div class="glow-bg" id="glowBg"></div>

    <div class="status-text listening" id="statusText">LISTENING</div>

    <!-- Waveform -->
    <div class="waveform-section">
      <canvas class="waveform-canvas" id="waveform" width="720" height="160"></canvas>
    </div>

    <!-- Gauge -->
    <div class="gauge-section">
      <svg class="gauge-svg" viewBox="0 0 290 175">
        <defs>
          <filter id="needleGlow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <path id="arcTrack" fill="none" stroke="#2A2A3A" stroke-width="3" stroke-linecap="round"/>
        <g id="ticks"></g>
        <line id="needle" x1="145" y1="155" x2="145" y2="60" stroke="#fff" stroke-width="2.5" stroke-linecap="round" filter="url(#needleGlow)"/>
        <circle cx="145" cy="155" r="6" fill="#1A1A25" stroke="#fff" stroke-width="2" id="centerDot"/>
      </svg>
    </div>

    <!-- Note -->
    <div class="note-section">
      <div class="note-row">
        <span class="note-name" id="noteName">A</span>
        <span class="note-sharp" id="noteSharp"></span>
        <span class="note-octave" id="noteOctave">4</span>
      </div>
      <div class="cents-row">
        <div class="cents-display" id="centsDisplay">+3¢</div>
        <div class="cents-bar-container">
          <div class="cents-bar-center"></div>
          <div class="cents-bar-indicator" id="centsBar"></div>
        </div>
      </div>
      <div class="freq-display" id="freqDisplay">441.8 Hz</div>
    </div>

    <!-- Strings -->
    <div class="strings-section" id="strings"></div>

    <!-- Instruments -->
    <div class="instrument-section">
      <div class="instrument-label">INSTRUMENT</div>
      <div class="instrument-chips" id="instrumentChips"></div>
    </div>
  </div>
</div>

<script>
const instruments = [
  { id:'chromatic', name:'Chromatic', icon:'🎵', tuning:[] },
  { id:'guitar', name:'Guitar', icon:'🎸', tuning:[
    {n:'E',o:4,f:329.63},{n:'B',o:3,f:246.94},{n:'G',o:3,f:196.00},{n:'D',o:3,f:146.83},{n:'A',o:2,f:110.00},{n:'E',o:2,f:82.41}
  ]},
  { id:'bass', name:'Bass', icon:'🎸', tuning:[
    {n:'G',o:2,f:98.00},{n:'D',o:2,f:73.42},{n:'A',o:1,f:55.00},{n:'E',o:1,f:41.20}
  ]},
  { id:'ukulele', name:'Ukulele', icon:'🪕', tuning:[
    {n:'A',o:4,f:440.00},{n:'E',o:4,f:329.63},{n:'C',o:4,f:261.63},{n:'G',o:4,f:392.00}
  ]},
  { id:'violin', name:'Violin', icon:'🎻', tuning:[
    {n:'E',o:5,f:659.25},{n:'A',o:4,f:440.00},{n:'D',o:4,f:293.66},{n:'G',o:3,f:196.00}
  ]},
];

let selected = 'guitar';
let activeString = 0;

// Fine-grained simulation state
let targetCents = 0;
let currentCents = 0;
let targetFreq = 329.63;
let currentFreq = 329.63;
let currentNote = 'E';
let currentOctave = 4;
let driftSpeed = 0;
let driftTarget = 0;
let tuningPhase = 'approaching'; // approaching, settling, in-tune, drifting

const CX=145, CY=155, R=110, NL=95;

function polar(cx,cy,r,deg){ const rad=deg*Math.PI/180; return {x:cx+r*Math.cos(rad),y:cy+r*Math.sin(rad)}; }
function arc(cx,cy,r,s,e){ const st=polar(cx,cy,r,e),en=polar(cx,cy,r,s); return `M ${st.x} ${st.y} A ${r} ${r} 0 ${e-s<=180?0:1} 0 ${en.x} ${en.y}`; }

document.getElementById('arcTrack').setAttribute('d', arc(CX,CY,R,-180,0));

// Build ticks
const ticksG = document.getElementById('ticks');
for(let c=-50;c<=50;c+=5){
  const ang = -180 + ((c+50)/100)*180;
  const isMaj = c%10===0, isCtr = c===0;
  const ir = R-(isCtr?20:isMaj?15:9);
  const i=polar(CX,CY,ir,ang), o=polar(CX,CY,R,ang);
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',i.x); line.setAttribute('y1',i.y);
  line.setAttribute('x2',o.x); line.setAttribute('y2',o.y);
  line.setAttribute('stroke', isCtr?'#00FFB2':'#444466');
  line.setAttribute('stroke-width', isCtr?2.5:isMaj?1.5:1);
  line.setAttribute('stroke-linecap','round');
  ticksG.appendChild(line);
}

function getColor(cents){
  const a = Math.abs(cents);
  if(a<=5) return '#00FFB2';
  if(a<=15) return '#FFD700';
  return '#FF4466';
}

function updateDisplay(){
  const ang = -180 + ((Math.max(-50,Math.min(50,currentCents))+50)/100)*180;
  const rad = ang*Math.PI/180;
  const needle = document.getElementById('needle');
  needle.setAttribute('x2', CX + NL*Math.cos(rad));
  needle.setAttribute('y2', CY + NL*Math.sin(rad));

  const col = getColor(currentCents);
  needle.setAttribute('stroke', col);
  document.getElementById('centerDot').setAttribute('stroke', col);

  const noteEl = document.getElementById('noteName');
  const sharpEl = document.getElementById('noteSharp');
  noteEl.style.color = col;
  sharpEl.style.color = col;

  const isInTune = Math.abs(currentCents) <= 5;
  noteEl.classList.toggle('glow', isInTune);
  document.getElementById('glowBg').classList.toggle('active', isInTune);

  // Split note name for sharps
  if(currentNote.includes('#')){
    noteEl.textContent = currentNote[0];
    sharpEl.textContent = '#';
  } else {
    noteEl.textContent = currentNote;
    sharpEl.textContent = '';
  }

  document.getElementById('noteOctave').textContent = currentOctave;

  const r = Math.round(currentCents);
  const centsEl = document.getElementById('centsDisplay');
  centsEl.textContent = r===0?'0¢':r>0?`+${r}¢`:`${r}¢`;
  centsEl.style.color = col;

  // Cents bar position: 0% = -50, 50% = 0, 100% = +50
  const barPos = ((currentCents + 50) / 100) * 100;
  const barEl = document.getElementById('centsBar');
  barEl.style.left = Math.max(0, Math.min(100, barPos)) + '%';
  barEl.style.background = col;
  barEl.style.boxShadow = `0 0 8px ${col}40`;

  document.getElementById('freqDisplay').textContent = currentFreq.toFixed(1) + ' Hz';
}

// Realistic tuning simulation
function startTuningCycle(){
  const inst = instruments.find(i=>i.id===selected);
  if(inst.tuning.length > 0){
    const s = inst.tuning[activeString];
    currentNote = s.n;
    currentOctave = s.o;
    targetFreq = s.f;
  }
  // Start far off, then approach
  targetCents = (Math.random()-0.5) * 60; // Start 30 cents off
  tuningPhase = 'approaching';
  driftSpeed = 0.3 + Math.random()*0.4;
}

function tick(){
  switch(tuningPhase){
    case 'approaching':
      // Gradually move toward zero (simulating user tuning)
      targetCents *= 0.97;
      currentCents += (targetCents - currentCents) * 0.08;
      if(Math.abs(targetCents) < 8){
        tuningPhase = 'settling';
        targetCents = (Math.random()-0.5) * 10;
      }
      break;
    case 'settling':
      // Fine oscillation near zero
      targetCents += (Math.random()-0.5) * 2;
      targetCents *= 0.92;
      currentCents += (targetCents - currentCents) * 0.12;
      if(Math.abs(currentCents) < 3 && Math.random() > 0.97){
        tuningPhase = 'in-tune';
        targetCents = (Math.random()-0.5) * 2;
      }
      break;
    case 'in-tune':
      // Very subtle drift within ±3 cents
      targetCents += (Math.random()-0.5) * 0.8;
      targetCents = Math.max(-3, Math.min(3, targetCents));
      currentCents += (targetCents - currentCents) * 0.15;
      // Eventually move to next string
      if(Math.random() > 0.992){
        tuningPhase = 'drifting';
      }
      break;
    case 'drifting':
      // Drift away before switching string
      targetCents += driftSpeed * (Math.random()>0.5?1:-1);
      currentCents += (targetCents - currentCents) * 0.06;
      if(Math.abs(currentCents) > 25){
        // Switch to next string
        const inst = instruments.find(i=>i.id===selected);
        if(inst.tuning.length > 0){
          activeString = (activeString + 1) % inst.tuning.length;
          renderStrings();
        }
        startTuningCycle();
      }
      break;
  }

  // Calculate displayed frequency from cents offset
  const notes = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const noteIdx = notes.indexOf(currentNote);
  const midi = noteIdx + (currentOctave+1)*12;
  currentFreq = 440 * Math.pow(2, (midi - 69 + currentCents/100) / 12);

  updateDisplay();
}

function renderStrings(){
  const inst = instruments.find(i=>i.id===selected);
  const el = document.getElementById('strings');
  el.innerHTML = '';
  inst.tuning.forEach((s,i)=>{
    const dot = document.createElement('div');
    dot.className = 'string-dot' + (i===activeString?' active':'');
    dot.innerHTML = `${s.n}<span class="oct">${s.o}</span>`;
    dot.onclick = ()=>{
      activeString=i;
      renderStrings();
      startTuningCycle();
    };
    el.appendChild(dot);
  });
}

function renderChips(){
  const el = document.getElementById('instrumentChips');
  el.innerHTML = '';
  instruments.forEach(inst=>{
    const chip = document.createElement('div');
    chip.className = 'chip'+(inst.id===selected?' selected':'');
    chip.innerHTML = `<span class="chip-icon">${inst.icon}</span>${inst.name}`;
    chip.onclick = ()=>{
      selected=inst.id;
      activeString=0;
      renderChips();
      renderStrings();
      startTuningCycle();
    };
    el.appendChild(chip);
  });
}

// Waveform
const canvas = document.getElementById('waveform');
const ctx = canvas.getContext('2d');
let phase = 0;
function drawWaveform(){
  ctx.clearRect(0,0,720,160);
  const freq = currentFreq;
  const wl = Math.max(15,Math.min(80,8000/freq));
  // Amplitude responds to how in-tune you are
  const baseAmp = 22;
  const ampBoost = Math.abs(currentCents)<=5 ? 8 : 0;
  const amp = baseAmp + ampBoost;

  ctx.beginPath();
  ctx.moveTo(0,80);
  for(let x=0;x<=720;x+=2){
    const envelope = Math.sin((x/720)*Math.PI);
    // Add harmonic overtone for richness
    const y = 80 + envelope * (
      amp * Math.sin((x/wl)*2*Math.PI + phase) +
      (amp*0.3) * Math.sin((x/(wl*0.5))*2*Math.PI + phase*1.5)
    );
    ctx.lineTo(x,y);
  }

  // Glow layer
  const glowCol = getColor(currentCents);
  ctx.strokeStyle = glowCol;
  ctx.lineWidth = 5;
  ctx.shadowColor = glowCol;
  ctx.shadowBlur = 20;
  ctx.globalAlpha = 0.4;
  ctx.stroke();

  // Main stroke
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.lineWidth = 2;
  ctx.stroke();

  phase += 0.04;
}

// Init
renderChips();
renderStrings();
startTuningCycle();

// Main loop
let lastTick = 0;
function animate(ts){
  drawWaveform();
  // Tick simulation at ~30fps for smooth but visible movement
  if(ts - lastTick > 33){
    tick();
    lastTick = ts;
  }
  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>

</body>
</html>
